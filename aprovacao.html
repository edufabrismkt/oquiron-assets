<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aprovação de Posts — Oquíron Digital</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #000000; color: #ffffff; min-height: 100vh; }
  .topbar { background: #000000; border-bottom: 1px solid #1f1f1f; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { height: 36px; width: auto; }
  .month-badge { font-size: 11px; padding: 4px 12px; border: 0.5px solid #B17A15; border-radius: 2px; color: #B17A15; letter-spacing: 0.1em; text-transform: uppercase; }
  .inner { max-width: 780px; margin: 0 auto; padding: 24px 20px; }
  .client-row { margin-bottom: 20px; }
  .client-name { font-size: 15px; font-weight: 500; color: #ffffff; }
  .client-handle { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 2px; }
  .progress-bar { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: #111111; border: 0.5px solid #222222; border-radius: 4px; margin-bottom: 20px; }
  .progress-text { font-size: 12px; color: rgba(255,255,255,0.5); }
  .progress-count { font-size: 12px; font-weight: 500; color: #B17A15; margin-left: auto; }
  .post-card { background: #0a0a0a; border: 0.5px solid #222222; border-radius: 4px; margin-bottom: 12px; overflow: hidden; transition: border-color 0.2s; }
  .post-card.aprovado { border: 1px solid #B17A15; }
  .post-card.recusado { border: 1px solid #444444; }
  .card-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 0.5px solid #1a1a1a; }
  .card-meta { display: flex; align-items: center; gap: 8px; }
  .post-num { font-size: 11px; color: rgba(255,255,255,0.3); letter-spacing: 0.1em; text-transform: uppercase; }
  .badge { font-size: 10px; padding: 2px 8px; border-radius: 2px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; }
  .badge-pilar { background: rgba(177,122,21,0.15); color: #B17A15; border: 0.5px solid rgba(177,122,21,0.3); }
  .badge-pend { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.35); }
  .badge-ok { background: rgba(177,122,21,0.2); color: #B17A15; }
  .badge-rec { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.25); }
  .card-date { font-size: 11px; color: rgba(255,255,255,0.3); }
  .card-body { display: flex; gap: 16px; padding: 16px; }
  .post-img { width: 110px; height: 138px; border-radius: 2px; background: #111111; border: 0.5px solid #222222; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; overflow: hidden; }
  .post-img img { width: 100%; height: 100%; object-fit: cover; }
  .img-placeholder { font-size: 10px; color: rgba(255,255,255,0.2); text-align: center; letter-spacing: 0.06em; text-transform: uppercase; padding: 8px; }
  .post-content { flex: 1; min-width: 0; }
  .post-text { font-size: 13px; color: rgba(255,255,255,0.55); line-height: 1.65; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden; }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; padding: 7px 14px; border-radius: 2px; cursor: pointer; letter-spacing: 0.04em; font-family: inherit; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.8; }
  .btn-ap { background: #B17A15; color: #000000; border: none; font-weight: 600; }
  .btn-rec { background: transparent; color: rgba(255,255,255,0.45); border: 0.5px solid #333333; }
  .obs-area { display: none; margin-top: 10px; }
  .obs-area.visible { display: block; }
  .obs-area textarea { width: 100%; background: #111111; border: 0.5px solid #333333; border-radius: 2px; color: #ffffff; font-size: 12px; padding: 10px 12px; resize: vertical; min-height: 72px; font-family: inherit; }
  .obs-area textarea::placeholder { color: rgba(255,255,255,0.2); }
  .btn-obs { margin-top: 6px; background: transparent; border: 0.5px solid #B17A15; color: #B17A15; font-size: 11px; padding: 6px 14px; border-radius: 2px; cursor: pointer; letter-spacing: 0.06em; font-family: inherit; }
  .status-msg { display: none; font-size: 11px; padding: 6px 10px; border-radius: 2px; margin-top: 8px; letter-spacing: 0.04em; }
  .status-msg.ok { display: block; background: rgba(177,122,21,0.1); color: #B17A15; border: 0.5px solid rgba(177,122,21,0.2); }
  .status-msg.rec { display: block; background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.4); border: 0.5px solid #333333; }
  .summary { display: flex; gap: 8px; margin-top: 20px; padding: 14px 16px; background: #111111; border: 0.5px solid #222222; border-radius: 4px; align-items: center; flex-wrap: wrap; }
  .sum-label { font-size: 11px; color: rgba(255,255,255,0.3); letter-spacing: 0.1em; text-transform: uppercase; margin-right: auto; }
  .sum-count { font-size: 12px; font-weight: 500; }
  .divider { width: 1px; height: 14px; background: #2a2a2a; }
  .loading { text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.3); font-size: 13px; }
  .error-msg { text-align: center; padding: 40px 20px; color: rgba(255,255,255,0.4); font-size: 13px; background: #111; border: 0.5px solid #333; border-radius: 4px; margin: 20px 0; }
</style>
</head>

<script>
  const WEBHOOK_URL = 'https://oquirondigital.app.n8n.cloud/webhook/aprovacao-conteudo';
  const SHEET_ID = '1kZosE13SbIGIZXLL5HKPeujgkpDWcs5JuanaIydoEus';
  const SHEET_NAME = 'Posts';

  const params = new URLSearchParams(window.location.search);
  const clienteParam = params.get('cliente') || 'oquiron_digital';
  const mesParam = params.get('mes') || '';

  const estados = {};
  let posts = [];

  function atualizar() {
    const total = posts.length;
    let ap = 0, rec = 0, pend = 0;
    posts.forEach(p => {
      const e = estados[p.id] || 'pend';
      if (e === 'ap') ap++;
      else if (e === 'rec') rec++;
      else pend++;
    });
    document.getElementById('sum-ap').textContent = ap + ' aprovado' + (ap !== 1 ? 's' : '');
    document.getElementById('sum-rec').textContent = rec + ' recusado' + (rec !== 1 ? 's' : '');
    document.getElementById('sum-pend').textContent = pend + ' pendente' + (pend !== 1 ? 's' : '');
    document.getElementById('prog').textContent = (ap + rec) + ' de ' + total + ' revisados';
  }

  function aprovar(id) {
    estados[id] = 'ap';
    document.getElementById('card-' + id).className = 'post-card aprovado';
    const b = document.getElementById('sb-' + id);
    b.textContent = 'Aprovado'; b.className = 'badge badge-ok';
    document.getElementById('obs-' + id).classList.remove('visible');
    const ta = document.querySelector('#obs-' + id + ' textarea');
    if (ta) { ta.disabled = false; ta.value = ''; }
    const btnObs = document.querySelector('#obs-' + id + ' .btn-obs');
    if (btnObs) btnObs.disabled = false;
    const m = document.getElementById('msg-' + id);
    m.className = 'status-msg ok'; m.textContent = 'Post aprovado para publicação.';
    atualizar();
    enviarWebhook(id, 'aprovado', '');
  }

  function recusar(id) {
    estados[id] = 'rec';
    document.getElementById('card-' + id).className = 'post-card recusado';
    const b = document.getElementById('sb-' + id);
    b.textContent = 'Recusado'; b.className = 'badge badge-rec';
    const m = document.getElementById('msg-' + id);
    m.className = 'status-msg rec'; m.textContent = 'Post recusado. Adicione seu feedback abaixo.';
    document.getElementById('obs-' + id).classList.add('visible');
    const ta = document.querySelector('#obs-' + id + ' textarea');
    if (ta) { ta.disabled = false; ta.value = ''; }
    const btnObs = document.querySelector('#obs-' + id + ' .btn-obs');
    if (btnObs) btnObs.disabled = false;
    atualizar();
  }

  function enviarObs(id) {
    const obs = document.querySelector('#obs-' + id + ' textarea').value;
    if (!obs.trim()) { alert('Por favor, descreva o que precisa ser alterado.'); return; }
    const m = document.getElementById('msg-' + id);
    m.className = 'status-msg rec';
    m.textContent = 'Feedback enviado. Nossa equipe irá revisar e reenviar o post em breve.';
    document.querySelector('#obs-' + id + ' textarea').disabled = true;
    document.querySelector('#obs-' + id + ' .btn-obs').disabled = true;
    enviarWebhook(id, 'recusado', obs);
  }

  function enviarWebhook(id, status, obs) {
    if (!WEBHOOK_URL) return;
    fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ post_id: id, status: status, observacao: obs, cliente: document.getElementById('nome-cliente').textContent })
    }).catch(() => {});
  }

  function renderPosts(data) {
    const container = document.getElementById('posts-container');
    if (!data || data.length === 0) {
      container.innerHTML = '<div class="error-msg">Nenhum post encontrado para aprovação.</div>';
      return;
    }
    posts = data;
    container.innerHTML = '';
    data.forEach((p, i) => {
      const num = String(i + 1).padStart(2, '0');
      const imgHtml = p.url_imagem
        ? '<img src="' + p.url_imagem + '" alt="Post">'
        : '<span class="img-placeholder">Imagem gerada</span>';
      container.innerHTML += `
        <div class="post-card" id="card-${p.id}">
          <div class="card-header">
            <div class="card-meta">
              <span class="post-num">Post ${num}</span>
              <span class="badge badge-pilar">${p.categoria || 'Geral'}</span>
              <span class="badge badge-pend" id="sb-${p.id}">Pendente</span>
            </div>
            <span class="card-date">${p.data_sugerida} · ${p.template_usado || 'imagem'}</span>
          </div>
          <div class="card-body">
            <div class="post-img">${imgHtml}</div>
            <div class="post-content">
              <p class="post-text">${p.texto_principal || ''}</p>
              <div class="actions">
                <button class="btn btn-ap" onclick="aprovar('${p.id}')">✓ Aprovar</button>
                <button class="btn btn-rec" onclick="recusar('${p.id}')">✕ Recusar</button>
              </div>
              <div class="obs-area" id="obs-${p.id}">
                <textarea placeholder="Descreva o que precisa ser alterado..."></textarea>
                <button class="btn-obs" onclick="enviarObs('${p.id}')">Enviar feedback</button>
              </div>
              <div class="status-msg" id="msg-${p.id}"></div>
            </div>
          </div>
        </div>`;
    });
    atualizar();
  }

  async function carregarPosts() {
    try {
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
      const resp = await fetch(url);
      const text = await resp.text();
      const json = JSON.parse(text.match(/google.visualization.Query.setResponse\(([\s\S]*)\)/)[1]);
      const cols = json.table.cols.map(c => c.label);
      const rows = json.table.rows.map(r => {
        const obj = {};
        r.c.forEach((cell, i) => { obj[cols[i]] = cell ? cell.v : ''; });
        return obj;
      });
      const filtrados = rows.filter(r =>
        r.cliente && r.cliente.toLowerCase().trim() === decodeURIComponent(clienteParam).toLowerCase().trim() &&
        r.status === 'aguardando_aprovacao'
      );
      const clienteNome = filtrados.length > 0 ? filtrados[0].cliente : clienteParam;
      document.getElementById('nome-cliente').textContent = clienteNome;
      document.getElementById('handle-cliente').textContent = filtrados.length > 0 ? '@' + clienteNome.toLowerCase().replace(/\s/g,'') + 'digital' : '';
      document.getElementById('mes-badge').textContent = mesParam || 'Posts para aprovação';
      renderPosts(filtrados.map(r => ({ ...r, id: r.post_id })));
    } catch(e) {
      document.getElementById('posts-container').innerHTML = '<div class="error-msg">Erro ao carregar posts. Verifique se a planilha está pública.</div>';
      document.getElementById('mes-badge').textContent = 'Erro';
    }
  }

  carregarPosts();
</script>
</body>
</html>
