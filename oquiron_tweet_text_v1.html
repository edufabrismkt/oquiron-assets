<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  @font-face {
    font-family: 'ProximaNova';
    src: url('https://edufabrismkt.github.io/oquiron-assets/ProximaNova-Regular.ttf') format('truetype');
    font-weight: 400;
  }
  @font-face {
    font-family: 'ProximaNova';
    src: url('https://edufabrismkt.github.io/oquiron-assets/ProximaNova-Bold.ttf') format('truetype');
    font-weight: 700;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1080px;
    height: 1350px;
    background: #ffffff;
    font-family: 'ProximaNova', -apple-system, sans-serif;
  }
  .card {
    width: 1080px;
    height: 1350px;
    background: #ffffff;
    padding: 96px 108px;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
  }
  .profile {
    display: flex;
    align-items: center;
    gap: 28px;
    margin-bottom: 56px;
  }
  .avatar {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
  }
  .profile-name {
    font-size: 38px;
    font-weight: 700;
    color: #000000;
    line-height: 1.1;
    letter-spacing: -0.02em;
    display: block;
  }
  .profile-handle {
    font-size: 30px;
    font-weight: 400;
    color: #666666;
    line-height: 1.2;
    display: block;
    margin-top: 4px;
  }
  .texto {
    font-size: 43px;
    font-weight: 400;
    color: #000000;
    line-height: 1.55;
    letter-spacing: -0.01em;
    white-space: pre-wrap;
  }
</style>
